version: 2

builds:
  - main: .
    binary: ssmx
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/inamuu/ssmx/cmd.version={{.Version}}

archives:
  - format: tar.gz

release:
  github:
    owner: inamuu
    name: ssmx
  replace_existing_artifacts: true

brews:
  - repository:
      owner: inamuu
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/inamuu/ssmx
    description: AWS SSM Session Manager CLI with configurable keepalive
